# BTS-497 Step 8 — minimal OTel Collector configuration.
# Step 9 evolves this with full receiver/exporter/processor wiring
# (fileexporter for raw-traces.jsonl + OTLP-HTTP exporter to Tempo).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  otlphttp/tempo:
    endpoint: http://tempo:4318
    tls:
      insecure: true
  file:
    path: /var/lib/otel/raw-traces.jsonl
    format: json
    rotation:
      max_megabytes: 100
      max_days: 7
      max_backups: 3

extensions:
  # Spec called this "healthcheckv2"; contrib 0.117.0 ships the well-supported
  # v1 `health_check` extension only (v2 lives in -dev under a different name).
  # Same port + same contract (200 OK at GET /); name change is the only
  # difference. Captured here so future v2-migration is a single-line edit.
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/tempo, file]
